<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion COUD LABO</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: linear-gradient(-45deg, #0d6efd, #2563eb, #1d4ed8, #60a5fa);
            background-size: 500% 500%;
            animation: dreamyBackground 14s ease infinite;
        }

        .halo {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            animation: haloMove 8s infinite ease-in-out;
        }

        .halo.one {
            width: 380px;
            height: 380px;
            background: rgba(255,255,255,0.55);
            top: 5%;
            left: 5%;
        }

        .halo.two {
            width: 450px;
            height: 450px;
            background: rgba(147,197,253,0.55);
            bottom: 5%;
            right: 5%;
            animation-delay: 2s;
        }

        .sparkles span {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255,255,255,0.8);
            animation: sparkleFloat 10s linear infinite;
        }

        .sparkles span:nth-child(1){left:10%; animation-delay:0s;}
        .sparkles span:nth-child(2){left:20%; animation-delay:2s;}
        .sparkles span:nth-child(3){left:35%; animation-delay:4s;}
        .sparkles span:nth-child(4){left:50%; animation-delay:6s;}
        .sparkles span:nth-child(5){left:65%; animation-delay:1s;}
        .sparkles span:nth-child(6){left:80%; animation-delay:3s;}
        .sparkles span:nth-child(7){left:90%; animation-delay:5s;}

        .login-wrapper {
            width: 100%;
            max-width: 560px;
            position: relative;
            z-index: 10;
            animation: breatheCard 6s infinite ease-in-out;
            padding: 20px;
        }

        .login-card {
            position: relative;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 34px;
            padding: 46px;
            box-shadow: 0 35px 90px rgba(0,0,0,0.22);
            overflow: hidden;
        }

        .logos-header {
            display: flex;
            justify-content: center;
            gap: 70px;
            margin-bottom: 24px;
        }

        .logo-box {
            width: 140px;
            height: 100px;
            background: rgba(255,255,255,0.96);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 18px 40px rgba(0,0,0,0.16);
            animation: logoOrbit 5s infinite ease-in-out;
        }

        .logo-box img {
            max-width: 110px;
            max-height: 70px;
            object-fit: contain;
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            margin: 0;
            font-size: 40px;
            color: white;
        }

        .brand p {
            margin-top: 12px;
            color: rgba(255,255,255,0.92);
            font-size: 16px;
            line-height: 1.6;
        }

        .field-group {
            margin-bottom: 22px;
        }

        .field-group label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .field-group input {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: rgba(255,255,255,0.94);
            font-size: 15px;
        }

        .password-box {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 18px;
            cursor: pointer;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #ffffff, #dbeafe);
            color: #0d6efd;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            animation: magneticPulse 2.2s infinite;
        }

        .signature-love {
            margin-top: 26px;
            text-align: center;
            color: rgba(255,255,255,0.95);
            line-height: 1.8;
            font-size: 14px;
            padding-top: 18px;
            border-top: 1px solid rgba(255,255,255,0.18);
        }

        .signature-love strong {
            font-size: 15px;
        }

        @keyframes dreamyBackground {
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        @keyframes haloMove {
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-40px);}
        }

        @keyframes sparkleFloat {
            0%{top:100%; opacity:0;}
            20%{opacity:1;}
            100%{top:-10%; opacity:0;}
        }

        @keyframes breatheCard {
            0%,100%{transform:scale(1);}
            50%{transform:scale(1.015);}
        }

        @keyframes logoOrbit {
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-8px);}
        }

        @keyframes magneticPulse {
            0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0.25);}
            50%{box-shadow:0 0 0 14px rgba(255,255,255,0);}
        }
    </style>
</head>
<body>
    <div class="halo one"></div>
    <div class="halo two"></div>

    <div class="sparkles">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logos-header">
                <div class="logo-box">
                    <img src="{{ url_for('static', filename='logo_labo.png') }}" alt="Logo labo">
                </div>
                <div class="logo-box">
                    <img src="{{ url_for('static', filename='logo_coud.png') }}" alt="Logo COUD">
                </div>
            </div>

            <div class="brand">
                <h1>💙 COUD LABO</h1>
                <p>🧬 Plateforme intelligente de gestion du laboratoire universitaire ✨</p>
            </div>

            <form method="POST">
                <div class="field-group">
                    <label>👤 Nom utilisateur</label>
                    <input type="text" name="username" placeholder="✨ Entrez votre identifiant" required>
                </div>

                <div class="field-group">
                    <label>🔐 Mot de passe</label>
                    <div class="password-box">
                        <input type="password" id="password" name="password" placeholder="💙 Entrez votre mot de passe" required>
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>

                <button type="submit" class="login-btn">🚀 Se connecter avec confiance</button>
            </form>

            <div class="signature-love">
                💙 <strong>COUD LABO LIS • Conçu avec passion par Djibril MBAYE</strong><br>
                ✨ Chaque connexion ouvre une porte vers la vie, l’amour et l’espoir 🧬<br>
                🌍 Ensemble, faisons parler la science au service de l’humain ❤️
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const password = document.getElementById("password");
            password.type = password.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
