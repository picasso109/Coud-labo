<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats validés - COUD LABO</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 30px;
            background: linear-gradient(135deg, #f4f8fb, #eef4ff);
            color: #1e293b;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(13,110,253,0.18);
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            font-size: 30px;
        }

        .header p {
            margin-top: 8px;
            opacity: 0.95;
            font-size: 16px;
        }

        .results-card {
            background: white;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.06);
            margin-bottom: 25px;
        }

        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            margin-bottom: 14px;
            border-radius: 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: 0.3s;
        }

        .result-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(13,110,253,0.08);
        }

        .result-left {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 17px;
            font-weight: 600;
        }

        .check {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #198754;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }

        .status {
            color: #198754;
            font-size: 14px;
            font-weight: 600;
            background: rgba(25,135,84,0.08);
            padding: 8px 12px;
            border-radius: 999px;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            display: block;
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-pdf {
            background: linear-gradient(135deg, #dc3545, #bb2d3b);
            color: white;
            box-shadow: 0 8px 18px rgba(220,53,69,0.2);
        }

        .btn-pdf:hover {
            transform: translateY(-2px);
        }

        .btn-back {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            box-shadow: 0 8px 18px rgba(13,110,253,0.2);
        }

        .btn-back:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .header h2 {
                font-size: 24px;
            }

            .result-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📋 Résultats validés - {{ patient.nom }} {{ patient.prenom }}</h2>
            <p><strong>Dossier :</strong> {{ patient.numero_dossier }}</p>
        </div>

        <div class="results-card">
            {% for demande in demandes %}
                <div class="result-item">
                    <div class="result-left">
                        <div class="check">✓</div>
                        <span>{{ demande.analyse.nom }}</span>
                    </div>
                    <div class="status">Validé</div>
                </div>
            {% endfor %}
        </div>

        <div class="actions">
            <a href="{{ url_for('resultats_pdf', patient_id=patient.id) }}" class="btn btn-pdf">
                📄 Télécharger le PDF officiel des résultats
            </a>

            <a href="{{ url_for('dashboard') }}" class="btn btn-back">
                🏠 Retour au dashboard
            </a>
        </div>
    </div>
</body>
</html>
