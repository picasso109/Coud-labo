<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prise de rendez-vous étudiant - COUD LABO</title>
    <style>
        body{
            font-family:Segoe UI,Arial,sans-serif;
            background:linear-gradient(-45deg,#dbeafe,#fdf2f8,#ede9fe,#e0f2fe);
            background-size:400% 400%;
            animation:bgFlow 14s ease infinite;
            margin:0;
            padding:30px;
            color:#334155;
            overflow-x:hidden;
            min-height:100vh;
            position:relative;
        }

        /* halos visibles */
        .halo{
            position:fixed;
            border-radius:50%;
            filter:blur(70px);
            opacity:.55;
            z-index:0;
            animation:haloDance 10s ease-in-out infinite;
        }

        .halo.one{
            width:420px;
            height:420px;
            background:#93c5fd;
            top:0;
            left:0;
        }

        .halo.two{
            width:460px;
            height:460px;
            background:#f9a8d4;
            bottom:0;
            right:0;
            animation-delay:2s;
        }

        .halo.three{
            width:380px;
            height:380px;
            background:#c4b5fd;
            top:35%;
            left:40%;
            animation-delay:4s;
        }

        /* icones flottantes */
        .float-icon{
            position:fixed;
            font-size:72px;
            opacity:.18;
            z-index:0;
            pointer-events:none;
            animation:floatIcon 12s ease-in-out infinite;
        }

        .dna1{left:3%; top:10%;}
        .dna2{right:5%; top:20%;}
        .micro1{left:8%; bottom:12%;}
        .blood1{right:10%; bottom:15%;}
        .blood2{left:48%; top:6%;}

        /* particules */
        .spark{
            position:fixed;
            width:10px;
            height:10px;
            border-radius:50%;
            background:rgba(255,255,255,.65);
            box-shadow:0 0 20px rgba(255,255,255,.7);
            z-index:0;
            animation:rise 9s linear infinite;
        }

        .s1{left:15%; animation-delay:0s;}
        .s2{left:35%; animation-delay:2s;}
        .s3{left:55%; animation-delay:4s;}
        .s4{left:75%; animation-delay:6s;}

        .container{
            max-width:780px;
            margin:auto;
            position:relative;
            z-index:2;
        }

        .header{
            background:linear-gradient(135deg,#60a5fa,#818cf8,#f9a8d4);
            color:white;
            padding:34px;
            border-radius:26px;
            margin-bottom:28px;
            box-shadow:0 20px 45px rgba(96,165,250,.28);
            text-align:center;
            animation:cardGlow 4s ease-in-out infinite;
        }

        .header h2{
            margin-bottom:10px;
            font-size:32px;
        }

        .card{
            background:rgba(255,255,255,.82);
            backdrop-filter:blur(14px);
            padding:38px;
            border-radius:26px;
            box-shadow:0 20px 40px rgba(0,0,0,.08);
            border:1px solid rgba(255,255,255,.65);
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:18px;
        }

        .field{
            display:flex;
            flex-direction:column;
        }

        .full{
            grid-column:span 2;
        }

        label{
            font-weight:700;
            margin-bottom:8px;
        }

        input{
            padding:16px;
            border:1px solid #dbeafe;
            border-radius:14px;
            font-size:15px;
            background:#fff;
            transition:.25s ease;
        }

        input:focus{
            outline:none;
            transform:scale(1.015);
            box-shadow:0 0 0 5px rgba(147,197,253,.28);
        }

        .btn{
            width:100%;
            margin-top:28px;
            padding:17px;
            border:none;
            border-radius:16px;
            background:linear-gradient(135deg,#34d399,#60a5fa,#f9a8d4);
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
            animation:pulseBtn 2.5s infinite;
        }

        .signature-love{
            margin-top:24px;
            text-align:center;
            line-height:1.9;
            font-size:14px;
            color:#475569;
            padding-top:20px;
            border-top:1px solid #e2e8f0;
        }

        @keyframes bgFlow{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        @keyframes haloDance{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-50px);}
        }

        @keyframes floatIcon{
            0%,100%{transform:translateY(0) rotate(0);}
            50%{transform:translateY(-45px) rotate(180deg);}
        }

        @keyframes rise{
            0%{top:100%; opacity:0;}
            20%{opacity:1;}
            100%{top:-10%; opacity:0;}
        }

        @keyframes cardGlow{
            0%,100%{box-shadow:0 20px 45px rgba(96,165,250,.28);}
            50%{box-shadow:0 24px 55px rgba(249,168,212,.35);}
        }

        @keyframes pulseBtn{
            0%,100%{box-shadow:0 0 0 0 rgba(96,165,250,.18);}
            50%{box-shadow:0 0 0 16px rgba(96,165,250,0);}
        }

        @media(max-width:768px){
            .grid{grid-template-columns:1fr}
            .full{grid-column:span 1}
        }
    </style>
</head>
<body>

<div class="halo one"></div>
<div class="halo two"></div>
<div class="halo three"></div>

<div class="float-icon dna1">🧬</div>
<div class="float-icon dna2">🧬</div>
<div class="float-icon micro1">🔬</div>
<div class="float-icon blood1">🩸</div>
<div class="float-icon blood2">🩸</div>

<div class="spark s1"></div>
<div class="spark s2"></div>
<div class="spark s3"></div>
<div class="spark s4"></div>

<div class="container">
    <div class="header">
        <h2>🎓💙 Prise de rendez-vous laboratoire COUD</h2>
        <p>✨ Une expérience lumineuse, rassurante et pleine d’espoir 🧬💖</p>
    </div>

    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            <div class="grid">
                <div class="field">
                    <label>👤 Nom</label>
                    <input type="text" name="nom" required>
                </div>

                <div class="field">
                    <label>👤 Prénom</label>
                    <input type="text" name="prenom" required>
                </div>

                <div class="field">
                    <label>🎓 Matricule</label>
                    <input type="text" name="matricule" required>
                </div>

                <div class="field">
                    <label>📱 Téléphone</label>
                    <input type="text" name="telephone" required>
                </div>

                <div class="field">
                    <label>🎂 Date de naissance</label>
                    <input type="date" name="date_naissance" required>
                </div>

                <div class="field full">
                    <label>📎🧪 Photo du bulletin</label>
                    <input type="file" name="bulletin" accept="image/*" required>
                </div>
            </div>

            <button class="btn" type="submit">
                ✅💖 Valider mon rendez-vous avec sérénité
            </button>
        </form>

        <div class="signature-love">
            💙 <strong>COUD LABO LIS • Avec amour, science et espoir Conçu avec passion par Djibril MBAYE </strong><br>
            ✨ Chaque rendez-vous est une promesse de soin, de douceur et de vie 🧬🌷
        </div>
    </div>
</div>
</body>
</html>
