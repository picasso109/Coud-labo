<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prise de rendez-vous étudiant - COUD LABO</title>
    <style>
        *{
            box-sizing:border-box;
        }

        body{
            font-family:Segoe UI,Arial,sans-serif;
            background:linear-gradient(-45deg,#dbeafe,#fdf2f8,#ede9fe,#e0f2fe);
            background-size:400% 400%;
            animation:bgFlow 14s ease infinite;
            margin:0;
            padding:16px;
            color:#334155;
            min-height:100vh;
            position:relative;
            overflow-x:hidden;
        }

        /* halos doux premium */
        .halo{
            position:fixed;
            border-radius:50%;
            filter:blur(70px);
            opacity:.45;
            z-index:0;
            animation:haloDance 10s ease-in-out infinite;
        }

        .halo.one{
            width:300px;
            height:300px;
            background:#93c5fd;
            top:-40px;
            left:-40px;
        }

        .halo.two{
            width:340px;
            height:340px;
            background:#f9a8d4;
            bottom:-40px;
            right:-40px;
            animation-delay:2s;
        }

        .halo.three{
            width:280px;
            height:280px;
            background:#c4b5fd;
            top:35%;
            left:45%;
            animation-delay:4s;
        }

        /* icônes flottantes plus discrètes */
        .float-icon{
            position:fixed;
            font-size:48px;
            opacity:.10;
            z-index:0;
            pointer-events:none;
            animation:floatIcon 12s ease-in-out infinite;
        }

        .dna1{left:2%; top:12%;}
        .dna2{right:3%; top:18%;}
        .micro1{left:5%; bottom:10%;}
        .blood1{right:8%; bottom:12%;}

        /* particules */
        .spark{
            position:fixed;
            width:8px;
            height:8px;
            border-radius:50%;
            background:rgba(255,255,255,.6);
            box-shadow:0 0 16px rgba(255,255,255,.7);
            z-index:0;
            animation:rise 9s linear infinite;
        }

        .s1{left:15%; animation-delay:0s;}
        .s2{left:40%; animation-delay:2s;}
        .s3{left:65%; animation-delay:4s;}
        .s4{left:85%; animation-delay:6s;}

        .container{
            width:100%;
            max-width:650px;
            margin:auto;
            position:relative;
            z-index:2;
        }

        .header{
            background:linear-gradient(135deg,#60a5fa,#818cf8,#f9a8d4);
            color:white;
            padding:22px;
            border-radius:24px;
            margin-bottom:20px;
            box-shadow:0 15px 35px rgba(96,165,250,.25);
            text-align:center;
            animation:cardGlow 4s ease-in-out infinite;
        }

        .header h2{
            font-size:24px;
            margin-bottom:8px;
            line-height:1.4;
        }

        .header p{
            font-size:14px;
            line-height:1.6;
        }

        .card{
            background:rgba(255,255,255,.90);
            backdrop-filter:blur(12px);
            padding:22px;
            border-radius:24px;
            box-shadow:0 16px 35px rgba(0,0,0,.06);
            border:1px solid rgba(255,255,255,.65);
        }

        .grid{
            display:grid;
            grid-template-columns:1fr;
            gap:16px;
        }

        .field{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:700;
            margin-bottom:8px;
            font-size:15px;
        }

        input{
            width:100%;
            padding:15px;
            border:1px solid #dbeafe;
            border-radius:16px;
            font-size:16px;
            background:#fff;
            transition:.25s ease;
        }

        input:focus{
            outline:none;
            box-shadow:0 0 0 4px rgba(147,197,253,.22);
        }

        input[type="file"]{
            padding:12px;
            font-size:14px;
            background:#fff;
        }

        .btn{
            width:100%;
            margin-top:22px;
            padding:16px;
            border:none;
            border-radius:18px;
            background:linear-gradient(135deg,#34d399,#60a5fa,#f9a8d4);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            box-shadow:0 10px 25px rgba(96,165,250,.22);
            animation:pulseBtn 2.5s infinite;
        }

        .signature-love{
            margin-top:20px;
            text-align:center;
            line-height:1.8;
            font-size:13px;
            color:#475569;
            padding-top:18px;
            border-top:1px solid #e2e8f0;
        }

        @keyframes bgFlow{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        @keyframes haloDance{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-30px);}
        }

        @keyframes floatIcon{
            0%,100%{transform:translateY(0) rotate(0);}
            50%{transform:translateY(-25px) rotate(180deg);}
        }

        @keyframes rise{
            0%{top:100%; opacity:0;}
            20%{opacity:1;}
            100%{top:-10%; opacity:0;}
        }

        @keyframes cardGlow{
            0%,100%{box-shadow:0 15px 35px rgba(96,165,250,.25);}
            50%{box-shadow:0 18px 42px rgba(249,168,212,.30);}
        }

        @keyframes pulseBtn{
            0%,100%{box-shadow:0 0 0 0 rgba(96,165,250,.18);}
            50%{box-shadow:0 0 0 14px rgba(96,165,250,0);}
        }

        @media(max-width:768px){
            body{
                padding:12px;
            }

            .header{
                padding:18px;
                border-radius:20px;
            }

            .header h2{
                font-size:21px;
            }

            .card{
                padding:18px;
                border-radius:20px;
            }

            input{
                padding:14px;
                font-size:16px;
            }

            .btn{
                padding:15px;
                font-size:15px;
            }

            .float-icon{
                font-size:38px;
            }
        }
    </style>
</head>
<body>

<div class="halo one"></div>
<div class="halo two"></div>
<div class="halo three"></div>

<div class="float-icon dna1">🧬</div>
<div class="float-icon dna2">🧬</div>
<div class="float-icon micro1">🔬</div>
<div class="float-icon blood1">🩸</div>

<div class="spark s1"></div>
<div class="spark s2"></div>
<div class="spark s3"></div>
<div class="spark s4"></div>

<div class="container">
    <div class="header">
        <h2>🎓💙 Prise de rendez-vous laboratoire COUD</h2>
        <p>✨ Une expérience lumineuse, rassurante et pleine d’espoir 🧬💖</p>
    </div>

    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            <div class="grid">
                <div class="field">
                    <label>👤 Nom</label>
                    <input type="text" name="nom" required>
                </div>

                <div class="field">
                    <label>👤 Prénom</label>
                    <input type="text" name="prenom" required>
                </div>

                <div class="field">
                    <label>🎓 Matricule</label>
                    <input type="text" name="matricule" required>
                </div>

                <div class="field">
                    <label>📱 Téléphone</label>
                    <input type="text" name="telephone" required>
                </div>

                <div class="field">
                    <label>🎂 Date de naissance</label>
                    <input type="date" name="date_naissance" required>
                </div>

                <div class="field">
                    <label>📎🧪 Photo du bulletin</label>
                    <input type="file" name="bulletin" accept="image/*" required>
                </div>
            </div>

            <button class="btn" type="submit">
                ✅💖 Valider mon rendez-vous avec sérénité
            </button>
        </form>

        <div class="signature-love">
            💙 <strong>COUD LABO LIS • Avec amour, science et espoir • Conçu avec passion par Djibril MBAYE</strong><br>
            ✨ Chaque rendez-vous est une promesse de soin, de douceur et de vie 🧬🌷
        </div>
    </div>
</div>

</body>
</html>
